name: Generate tools.json

on:
  push:
    branches:
      - main
    paths:
      - "tool/**"
      - "assets/thumbs/**"
      - "scripts/generate-tools.js"
      - ".github/workflows/generate-tools.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-tools:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate tools.json
        run: node scripts/generate-tools.js

      - name: Commit updated tools.json
        run: |
          if git diff --quiet data/tools.json; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/tools.json
          git commit -m "Auto-generate tools.json"
          git push